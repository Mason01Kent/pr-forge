name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extensions/pr-forge/package-lock.json

      - name: Install dependencies
        working-directory: extensions/pr-forge
        run: npm ci

      - name: Lint
        working-directory: extensions/pr-forge
        run: npm run lint

      - name: Compile
        working-directory: extensions/pr-forge
        run: npm run compile

      - name: Test
        working-directory: extensions/pr-forge
        run: npm test
        env:
          TS_NODE_PROJECT: tsconfig.test.json

      - name: Package extension
        working-directory: extensions/pr-forge
        run: npx vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-forge-vsix
          path: extensions/pr-forge/*.vsix
          retention-days: 30
