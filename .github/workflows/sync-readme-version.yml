name: Sync README version

on:
  push:
    branches: [master]
    paths:
      - 'extensions/pr-forge/package.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: ver
        run: |
          VERSION=$(node -p "require('./extensions/pr-forge/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update VSIX reference in README
        run: |
          sed -i -E \
            "s|pr-forge-[0-9]+\.[0-9]+\.[0-9]+\.vsix|pr-forge-${{ steps.ver.outputs.version }}.vsix|g" \
            README.md

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "docs: bump README VSIX reference to v${{ steps.ver.outputs.version }}"
          )
          git push
